name: podcast-transcriber
channels:
  - conda-forge
dependencies:
  - python>=3.9
  - ctranslate2
  - ffmpeg
  - huggingface_hub
  - jiwer
  - modelscope
  - mutagen
  - openai-whisper
  - pyaudio
  - torchaudio
  - tqdm
  - plyer
  - python-dotenv
  - pip
  - pip:
      # whisperx and funasr are not consistently available as conda-forge packages.
      # Keep pip packages isolated here so conda can solve the binary stack first.
      - whisperx
      - funasr>=1.1.3
      - opencc-python-reimplemented
      - qwen-asr
